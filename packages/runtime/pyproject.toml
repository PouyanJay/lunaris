[project]
name = "lunaris-runtime"
version = "0.0.0"
description = "Lunaris runtime — the course-object schema, settings, logging, and persistence spine"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9",
    "structlog>=24.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lunaris_runtime"]
