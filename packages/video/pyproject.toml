[project]
name = "lunaris-video"
version = "0.0.0"
description = "Lunaris video — the explainer-video worker loop + pipeline (V0: stub pipeline)"
requires-python = ">=3.12"
dependencies = [
    "lunaris-runtime",
    "pydantic>=2.9",
    "structlog>=24.4",
    "httpx>=0.27",
]

[project.optional-dependencies]
# The render toolchain (Manim CE) is optional: hermetic tests never import it, CI installs
# without extras, and only render-capable environments (local dev via `make video-deps`, the
# V7 cloud worker image) pay for it. ffmpeg is a system binary, not a wheel.
render = ["manim>=0.19"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lunaris_video"]

[tool.uv.sources]
lunaris-runtime = { workspace = true }
