[project]
name = "lunaris-video"
version = "0.0.0"
description = "Lunaris video — the explainer-video worker loop + pipeline (V0: stub pipeline)"
requires-python = ">=3.12"
dependencies = [
    "lunaris-runtime",
    "structlog>=24.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lunaris_video"]

[tool.uv.sources]
lunaris-runtime = { workspace = true }
