[project]
name = "lunaris-agent"
version = "0.0.0"
description = "Lunaris agent — orchestrator and model router over the course-object"
requires-python = ">=3.12"
dependencies = [
    "lunaris-runtime",
    "lunaris-graph",
    "langchain-anthropic>=0.3",
    "langchain>=0.3",
    "langchain-core>=0.3",
    "langgraph>=0.2",
    "deepagents>=0.0.2",
    "structlog>=24.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lunaris_agent"]

[tool.uv.sources]
lunaris-runtime = { workspace = true }
lunaris-graph = { workspace = true }
