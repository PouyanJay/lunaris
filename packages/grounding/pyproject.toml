[project]
name = "lunaris-grounding"
version = "0.0.0"
description = "Lunaris grounding — evidence retrieval + the deterministic verifier (Failure-B moat)"
requires-python = ">=3.12"
dependencies = [
    "lunaris-runtime",
    "langchain-anthropic>=0.3",
    "langchain-voyageai>=0.1",
    "supabase>=2.9",
    "structlog>=24.4",
    "tavily-python>=0.5",
    "trafilatura>=1.12",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lunaris_grounding"]

[tool.uv.sources]
lunaris-runtime = { workspace = true }
