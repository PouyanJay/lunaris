[project]
name = "lunaris-eval"
version = "0.0.0"
description = "Lunaris eval — deterministic quality checks against the MVP definition of done"
requires-python = ">=3.12"
dependencies = [
    "lunaris-runtime",
    "pydantic>=2.9",
]

[project.scripts]
lunaris-eval = "lunaris_eval.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lunaris_eval"]

[tool.uv.sources]
lunaris-runtime = { workspace = true }
