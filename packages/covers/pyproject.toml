[project]
name = "lunaris-covers"
version = "0.0.0"
description = "Lunaris course covers — the AI cover-image worker loop + pipeline (T0: stub pipeline)"
requires-python = ">=3.12"
dependencies = [
    "lunaris-runtime",
    "openai>=2.0",
    "pydantic>=2.9",
    "structlog>=24.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lunaris_covers"]

[tool.uv.sources]
lunaris-runtime = { workspace = true }
