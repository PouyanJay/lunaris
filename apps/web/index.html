<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- theme-color values mirror THEME_COLOR in src/hooks/useTheme.ts — keep them in sync -->
    <meta name="theme-color" content="#ffffff" />
    <title>Lunaris — turn a topic into a verified course</title>
    <meta
      name="description"
      content="Lunaris turns a topic into a real, verified course: an agent plans the curriculum, writes the lessons, and grounds every factual claim against evidence."
    />

    <!-- Link-preview / social cards (Open Graph). The absolute image URL is required — crawlers
         (iMessage, Slack, X, LinkedIn) won't resolve a relative path or render the SVG favicon. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Lunaris" />
    <meta property="og:url" content="https://lunaris.pouyan.ai/" />
    <meta property="og:title" content="Lunaris — turn a topic into a real, verified course" />
    <meta
      property="og:description"
      content="An agent plans the curriculum, writes the lessons, and grounds every factual claim against evidence."
    />
    <meta property="og:image" content="https://lunaris.pouyan.ai/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Lunaris — turn a topic into a real, verified course" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Lunaris — turn a topic into a real, verified course" />
    <meta
      name="twitter:description"
      content="An agent plans the curriculum, writes the lessons, and grounds every factual claim against evidence."
    />
    <meta name="twitter:image" content="https://lunaris.pouyan.ai/og-image.png" />
    <script>
      // Apply the saved theme before first paint (no flash). Default: light.
      (function () {
        try {
          if (localStorage.getItem("lunaris-theme") === "dark") {
            document.documentElement.setAttribute("data-theme", "dark");
            var m = document.querySelector('meta[name="theme-color"]');
            if (m) m.setAttribute("content", "#090a0c"); // THEME_COLOR.dark in useTheme.ts
          }
        } catch (e) {
          /* private mode / no storage — stay on the light default */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
