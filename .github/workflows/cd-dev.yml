name: CD (dev)

# Continuous deployment to the DEV environment on every push to main.
#
# Build-once-promote (§5 of the Azure plan): this workflow builds the API image, tags it by commit
# SHA, pushes it to ACR, and records the digest as an artifact + summary so cd-prod.yml can promote
# the *exact same* image to prod — prod never rebuilds.
#
# Auth to Azure is via GitHub OIDC federation (no stored cloud credentials). The federated identity
# is scoped to `environment:dev`, so this job MUST run with `environment: dev` for the token exchange
# to succeed.
#
# The platform (main.bicep — ACR, Key Vault, Managed Identity, ACA env, role assignments) is
# bootstrap infra deployed out-of-band by an Owner. CD is least-privilege (Contributor) and only
# rolls a new Container App revision via app.bicep; its platform wiring comes from `dev` env vars.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # request the OIDC token for azure/login
  contents: read

concurrency:
  group: cd-dev
  cancel-in-progress: false # never interrupt an in-flight deploy

jobs:
  deploy:
    name: Build, migrate & deploy (dev)
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      image: ${{ steps.image.outputs.ref }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Compute image reference
        id: image
        run: echo "ref=${{ vars.ACR_LOGIN_SERVER }}/lunaris-api:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: ACR login
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - uses: docker/setup-buildx-action@v3

      - name: Build & push API image (linux/amd64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          platforms: linux/amd64 # ACA runs amd64; the GitHub runner is amd64-native
          push: true
          tags: ${{ steps.image.outputs.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Supabase CLI
        if: vars.SUPABASE_DB_POOLER_HOST != ''
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Push migrations over the IPv4 session pooler with `--db-url` (DB password only — no
      # Management-API token needed; the direct DB host is IPv6-only and unreachable from the runner).
      - name: Push DB migrations (dev)
        if: vars.SUPABASE_DB_POOLER_HOST != ''
        env:
          PGPW: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          ENCPW=$(python3 -c "import urllib.parse,os;print(urllib.parse.quote(os.environ['PGPW'],safe=''))")
          URL="postgresql://postgres.${{ vars.SUPABASE_PROJECT_REF }}:${ENCPW}@${{ vars.SUPABASE_DB_POOLER_HOST }}:5432/postgres"
          supabase db push --db-url "$URL"

      - name: Note migration skip
        if: vars.SUPABASE_DB_POOLER_HOST == ''
        run: echo "::warning::SUPABASE_DB_POOLER_HOST not set for this environment — skipped 'supabase db push'."

      - name: Deploy Container App (app.bicep)
        run: |
          az deployment group create \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --name "lunaris-dev-app-${{ github.run_number }}" \
            --template-file infra/app.bicep \
            --parameters \
              env=dev \
              location="${{ vars.LOCATION }}" \
              image="${{ steps.image.outputs.ref }}" \
              managedEnvironmentId="${{ vars.ACA_ENV_ID }}" \
              managedIdentityResourceId="${{ vars.MI_RESOURCE_ID }}" \
              acrLoginServer="${{ vars.ACR_LOGIN_SERVER }}" \
              keyVaultUri="${{ vars.KEYVAULT_URI }}" \
              supabaseUrl="${{ vars.SUPABASE_URL }}" \
              corsOrigins="${{ vars.CORS_ORIGINS }}" \
              pipeline="${{ vars.PIPELINE_MODE }}" \
              withProviderKeys="${{ vars.WITH_PROVIDER_KEYS || 'false' }}" \
              withByok="${{ vars.WITH_BYOK || 'false' }}" \
              draftTierEnabled="${{ vars.DRAFT_TIER_ENABLED || 'false' }}" \
              keylessLlmBaseUrl="${{ vars.KEYLESS_LLM_BASE_URL }}" \
              keylessEmbeddingsBaseUrl="${{ vars.KEYLESS_EMBEDDINGS_BASE_URL }}"

      - name: Deployment summary
        run: |
          FQDN=$(az containerapp show -g "${{ vars.RESOURCE_GROUP }}" -n lunaris-dev-api \
            --query properties.configuration.ingress.fqdn -o tsv)
          {
            echo "### Dev deploy ✅"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Image | \`${{ steps.image.outputs.ref }}\` |"
            echo "| Digest | \`${{ steps.build.outputs.digest }}\` |"
            echo "| Pipeline | \`${{ vars.PIPELINE_MODE }}\` |"
            echo "| URL | https://$FQDN |"
          } >> "$GITHUB_STEP_SUMMARY"

  web:
    name: Build & deploy SPA (dev)
    runs-on: ubuntu-latest
    environment: dev
    # Independent of the API deploy — VITE_API_URL is the stable API host, baked at build time.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          # Turns on the web AuthGate + supabase-js login. Must be present at build time or the SPA
          # ships auth-disabled while the API (SUPABASE_URL set) requires tokens → every route 401s.
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
      - name: Deploy to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_DEPLOY_TOKEN }}
          action: upload
          app_location: apps/web/dist # already built above
          skip_app_build: true
          skip_api_build: true
