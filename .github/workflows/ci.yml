name: CI

# Gates every PR (and pushes to main) — Python, web, the API image build, and secret scanning.
# Runs with a read-only token and NO secrets, so it is safe to run on forked-PR contributions.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.17"
          enable-cache: true
      # Installs the workspace incl. the dev group (pytest/ruff). The default suite is `-m "not eval"`
      # (pyproject addopts) and runs fully offline — no Postgres service needed.
      - run: uv sync --frozen --all-packages
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest -q

  db:
    name: Database (migrations + lint + RLS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      # A fresh local Postgres with every migration applied — a broken migration fails CI here
      # instead of in CD against the real database. `migration up` is the explicit apply (idempotent
      # when `db start` already ran them).
      - run: supabase db start
      - run: supabase migration up
      - run: supabase db lint --fail-on warning
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.17"
          enable-cache: true
      - run: uv sync --frozen --all-packages
      # Prove the RLS posture against the real schema: owner isolation behaves, the secrets/corpus
      # tables stay locked down, and function EXECUTE stays revoked. The suite is eval-gated, so the
      # default offline pytest run skips it; here the CLI's local stack provides the database.
      - run: uv run pytest tests/db -m eval -q
        env:
          SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

  web:
    name: Web (typecheck + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  docker-build:
    name: API image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Build + load into the daemon (no push — that's Phase 1's cd-*.yml) so Trivy can scan it.
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: false
          load: true
          tags: lunaris-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy image scan (fail on fixable HIGH/CRITICAL)
        # `--ignore-unfixed` keeps the gate actionable (only CVEs with an available fix fail the
        # build). Pinned image, scans the local image via the daemon socket (verified locally).
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            ghcr.io/aquasecurity/trivy:0.71.0 image \
            --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 \
            --scanners vuln --no-progress lunaris-api:ci

  worker-build:
    name: Video worker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # The dedicated video-worker image (explainer-video V7): lunaris-api + the Manim render extra
      # (cairo/pango + ffmpeg, no LaTeX). Build + load (no push — that's cd-*.yml) so Trivy scans it;
      # the build's `import manim` step also fails here if a render runtime lib is missing.
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          push: false
          load: true
          tags: lunaris-video-worker:ci
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
      - name: Trivy image scan (fail on fixable HIGH/CRITICAL)
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            ghcr.io/aquasecurity/trivy:0.71.0 image \
            --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 \
            --scanners vuln --no-progress lunaris-video-worker:ci

  secrets:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fail if a secret-looking file is tracked
        run: |
          # Real env/key files must never be tracked — but `.env.sample`/`.env.example` templates are fine.
          tracked=$(git ls-files \
            | grep -E '(^|/)(\.env(\.[^/]+)?|.*\.pem|.*\.key|id_rsa)$' \
            | grep -vE '(^|/)\.env\.(sample|example|template)$' || true)
          if [ -n "$tracked" ]; then
            echo "$tracked"
            echo "::error::A secret-looking file is tracked in git — remove it and rotate the secret."
            exit 1
          fi
          echo "No tracked secret files."
      - name: gitleaks (new commits)
        # Scan only the commits this event introduces — the one-time full-history sweep is done out of
        # band, so old history can't make every PR fail. Pinned image, no license needed (public repo).
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="--log-opts=${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            RANGE="--log-opts=-1"
          fi
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.28.0 \
            detect --source=/repo --redact --no-banner $RANGE
