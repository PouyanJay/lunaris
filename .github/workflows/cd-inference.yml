name: CD (inference images)

# Builds + pushes the keyless inference images (the chat server + the embeddings server, both CPU) to
# ACR, SHA-tagged, for keyless ("Draft") builds (keyless-fallbacks T8).
#
# NOT on every push: these images bundle a model download and change rarely, so building them on
# every main push would bloat each deploy. They rebuild exactly when their inputs change — a push
# that touches infra/inference/** — plus on demand (workflow_dispatch), so they can't silently go
# stale while the Draft tier serves from them (cd-dev/cd-prod also warn when the running image
# predates the last inference change).
#
# After pushing, the dev Container Apps are rolled to the new images when they exist. The FIRST
# deploy of the apps is still manual (see infra/inference/README.md) — but on CPU it needs no
# special quota. Prod stays a manual promote (az acr import + az containerapp update), surfaced by
# cd-prod's staleness warning.
#
# Auth is GitHub OIDC federation scoped to `environment: dev` (same as cd-dev), so the ACR push
# reuses the dev federated identity.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "infra/inference/**"

permissions:
  id-token: write # request the OIDC token for azure/login
  contents: read

concurrency:
  group: cd-inference
  cancel-in-progress: false

jobs:
  build:
    name: Build & push inference images
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Compute image references
        id: image
        run: |
          echo "chat=${{ vars.ACR_LOGIN_SERVER }}/lunaris-inference:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "embeddings=${{ vars.ACR_LOGIN_SERVER }}/lunaris-embeddings:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: ACR login
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - uses: docker/setup-buildx-action@v3

      - name: Build & push chat image (Qwen2.5-3B, CPU)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/inference/Dockerfile
          platforms: linux/amd64 # ACA runs amd64
          push: true
          tags: ${{ steps.image.outputs.chat }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push embeddings image (bge-large-en-v1.5, CPU)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/inference/Dockerfile.embeddings
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.embeddings }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Pushing an image nobody runs is the staleness gap this workflow closes — roll the dev apps
      # to the fresh images. Apps that don't exist yet warn loudly (first deploy is manual,
      # infra/inference/README.md) instead of failing the build-and-push that DID succeed.
      - name: Roll dev Container Apps to the new images
        run: |
          set -euo pipefail
          roll() {
            local app="$1" image="$2"
            if az containerapp show -g "${{ vars.RESOURCE_GROUP }}" -n "$app" >/dev/null 2>&1; then
              az containerapp update -g "${{ vars.RESOURCE_GROUP }}" -n "$app" --image "$image" \
                --output none
              echo "✅ $app rolled to $image"
            else
              echo "::warning::$app does not exist yet — image pushed but not deployed (first deploy is manual, see infra/inference/README.md)."
            fi
          }
          roll lunaris-dev-inference  "${{ steps.image.outputs.chat }}"
          roll lunaris-dev-embeddings "${{ steps.image.outputs.embeddings }}"

      - name: Summary
        run: |
          {
            echo "### Keyless inference images pushed ✅"
            echo ""
            echo "| Service | Image |"
            echo "|---|---|"
            echo "| Chat (CPU)        | \`${{ steps.image.outputs.chat }}\` |"
            echo "| Embeddings (CPU)  | \`${{ steps.image.outputs.embeddings }}\` |"
            echo ""
            echo "Dev apps were rolled to these images where they exist (see the step above)."
            echo "Prod promote stays manual: \`az acr import\` both images into the prod ACR, then"
            echo "\`az containerapp update --image\` on lunaris-prod-inference / -embeddings."
            echo "See infra/inference/README.md."
          } >> "$GITHUB_STEP_SUMMARY"
