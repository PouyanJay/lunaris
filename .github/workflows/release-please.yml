name: release-please

# Automates versioning + GitHub Releases from Conventional Commits — no manual tagging.
# On every push to main, release-please reads the commits merged since the last release and maintains a
# standing "release PR" that proposes the next version (computed by semver) plus an updated CHANGELOG.
# You release by merging that PR: it bumps version.txt + the manifest, tags the version, and publishes
# the GitHub Release. Pre-1.0 scheme (see release-please-config.json):
#   fix:       -> PATCH   (0.1.0 -> 0.1.1)
#   feat:      -> MINOR   (0.1.0 -> 0.2.0)
#   feat!: / BREAKING CHANGE: -> MINOR while < 1.0 (0.1.0 -> 0.2.0, NOT 1.0.0)
# Uses the default GITHUB_TOKEN. Requires "Allow GitHub Actions to create and approve pull requests"
# under Settings -> Actions -> General -> Workflow permissions.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release PR + tag
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
