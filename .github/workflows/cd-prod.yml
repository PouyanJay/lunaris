name: CD (prod)

# Gated promotion to PROD. Build-once-promote (§5): this workflow NEVER rebuilds — it copies the
# exact image already built & validated in dev (by commit SHA) from the dev ACR into the prod ACR via
# `az acr import`, then rolls a prod Container App revision from that same artifact.
#
# Gated by the `prod` GitHub Environment (required reviewer), so a human approves every prod release.
# Auth is OIDC federated to `environment:prod`.
#
# PREREQUISITES (land in Phase-1 NEXT STEP 4, once Supabase Pro billing is on):
#   • rg-lunaris-prod platform deployed (main.bicep env=prod) → fills the prod env vars below.
#   • prod SP (lunaris-github-cd-prod) granted: Contributor on rg-lunaris-prod, AcrPush on prod ACR,
#     and AcrPull on the DEV ACR (so `az acr import` can read the source image).
#   • prod env secrets: AZURE_CLIENT_ID (done), SUPABASE_DB_PASSWORD, SUPABASE_ACCESS_TOKEN.
#   • prod env vars: RESOURCE_GROUP, ACR_NAME, ACR_LOGIN_SERVER, ACA_ENV_ID, MI_RESOURCE_ID,
#     KEYVAULT_URI, SUPABASE_URL, SUPABASE_PROJECT_REF, PIPELINE_MODE, CORS_ORIGINS, DEV_ACR_LOGIN_SERVER.

on:
  workflow_dispatch:
    inputs:
      image_sha:
        description: "Commit SHA of the dev-validated image to promote (defaults to current main)."
        required: false
        default: ""
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

concurrency:
  group: cd-prod
  cancel-in-progress: false

jobs:
  promote:
    name: Promote to prod
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — the inference staleness check tests commit ancestry

      - name: Resolve image SHA
        id: sha
        run: |
          SHA="${{ github.event.inputs.image_sha }}"
          [ -z "$SHA" ] && SHA="${{ github.sha }}"
          echo "value=$SHA" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Cross-registry import in the same AD tenant: pass the SOURCE registry via --registry (its
      # resource ID) so az authenticates the source pull with the caller's AAD identity (the prod SP
      # has AcrPull on the dev ACR). Without --registry, --source <loginServer>/... is treated as an
      # external/credentialless source and 401s for an SP. --source is then repo:tag (no host).
      - name: Promote image (dev ACR -> prod ACR, same tag)
        run: |
          az acr import \
            --name "${{ vars.ACR_NAME }}" \
            --registry "${{ vars.DEV_ACR_RESOURCE_ID }}" \
            --source "lunaris-api:${{ steps.sha.outputs.value }}" \
            --image "lunaris-api:${{ steps.sha.outputs.value }}" \
            --force

      # Promote the dev-built video-worker image the same way (explainer-video V7) — only when video
      # is on for prod (the V7-T5 rollout). The exact SHA cd-dev built must exist in the dev ACR.
      - name: Promote video-worker image (dev ACR -> prod ACR, same tag)
        if: vars.VIDEO_GENERATION_ENABLED == 'true'
        run: |
          az acr import \
            --name "${{ vars.ACR_NAME }}" \
            --registry "${{ vars.DEV_ACR_RESOURCE_ID }}" \
            --source "lunaris-video-worker:${{ steps.sha.outputs.value }}" \
            --image "lunaris-video-worker:${{ steps.sha.outputs.value }}" \
            --force

      # Promote the dev-built cover-worker image the same way (course-cover-images) — only when covers
      # are on for prod. The exact SHA cd-dev built must exist in the dev ACR.
      - name: Promote cover-worker image (dev ACR -> prod ACR, same tag)
        if: vars.COVER_GENERATION_ENABLED == 'true'
        run: |
          az acr import \
            --name "${{ vars.ACR_NAME }}" \
            --registry "${{ vars.DEV_ACR_RESOURCE_ID }}" \
            --source "lunaris-cover-worker:${{ steps.sha.outputs.value }}" \
            --image "lunaris-cover-worker:${{ steps.sha.outputs.value }}" \
            --force

      - name: Setup Supabase CLI
        if: vars.SUPABASE_DB_POOLER_HOST != ''
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Push migrations over the IPv4 session pooler with `--db-url` (DB password only — no token).
      - name: Push DB migrations (prod)
        if: vars.SUPABASE_DB_POOLER_HOST != ''
        env:
          PGPW: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          ENCPW=$(python3 -c "import urllib.parse,os;print(urllib.parse.quote(os.environ['PGPW'],safe=''))")
          URL="postgresql://postgres.${{ vars.SUPABASE_PROJECT_REF }}:${ENCPW}@${{ vars.SUPABASE_DB_POOLER_HOST }}:5432/postgres?sslmode=require"
          supabase db push --db-url "$URL"

      - name: Deploy Container App (app.bicep, prod)
        run: |
          az deployment group create \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --name "lunaris-prod-app-${{ github.run_number }}" \
            --template-file infra/app.bicep \
            --parameters \
              env=prod \
              location="${{ vars.LOCATION }}" \
              image="${{ vars.ACR_LOGIN_SERVER }}/lunaris-api:${{ steps.sha.outputs.value }}" \
              managedEnvironmentId="${{ vars.ACA_ENV_ID }}" \
              managedIdentityResourceId="${{ vars.MI_RESOURCE_ID }}" \
              acrLoginServer="${{ vars.ACR_LOGIN_SERVER }}" \
              keyVaultUri="${{ vars.KEYVAULT_URI }}" \
              supabaseUrl="${{ vars.SUPABASE_URL }}" \
              corsOrigins="${{ vars.CORS_ORIGINS }}" \
              pipeline="${{ vars.PIPELINE_MODE }}" \
              withProviderKeys="${{ vars.WITH_PROVIDER_KEYS || 'false' }}" \
              withByok="${{ vars.WITH_BYOK || 'false' }}" \
              draftTierEnabled="${{ vars.DRAFT_TIER_ENABLED || 'false' }}" \
              keylessLlmBaseUrl="${{ vars.KEYLESS_LLM_BASE_URL }}" \
              keylessEmbeddingsBaseUrl="${{ vars.KEYLESS_EMBEDDINGS_BASE_URL }}" \
              videoGenerationEnabled="${{ vars.VIDEO_GENERATION_ENABLED || 'false' }}" \
              coverGenerationEnabled="${{ vars.COVER_GENERATION_ENABLED || 'false' }}" \
              adminEmails="${{ vars.LUNARIS_ADMIN_EMAILS }}" \
              prodOpsSubscriptionId="${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
              prodOpsResourceGroup="${{ vars.RESOURCE_GROUP }}"

      # The dedicated video-worker Container App (explainer-video V7) — the single prod rollout flips
      # vars.VIDEO_GENERATION_ENABLED on (V7-T5), which both lets the API enqueue and deploys this.
      # KEDA keeps it at zero replicas until a job is enqueued. Scaler conn = the IPv4 pooler (same as
      # migrations); without a pooler host it deploys scaler-less (idles at 0).
      - name: Deploy video worker (video.bicep, prod)
        if: vars.VIDEO_GENERATION_ENABLED == 'true'
        env:
          PGPW: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          PG_CONN=""
          if [ -n "${{ vars.SUPABASE_DB_POOLER_HOST }}" ]; then
            ENCPW=$(python3 -c "import urllib.parse,os;print(urllib.parse.quote(os.environ['PGPW'],safe=''))")
            PG_CONN="postgresql://postgres.${{ vars.SUPABASE_PROJECT_REF }}:${ENCPW}@${{ vars.SUPABASE_DB_POOLER_HOST }}:5432/postgres?sslmode=require"
          else
            echo "::warning::SUPABASE_DB_POOLER_HOST unset — video worker deploys without the KEDA scaler (idles at 0)."
          fi
          az deployment group create \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --name "lunaris-prod-video-${{ github.run_number }}" \
            --template-file infra/video.bicep \
            --parameters \
              env=prod \
              location="${{ vars.LOCATION }}" \
              image="${{ vars.ACR_LOGIN_SERVER }}/lunaris-video-worker:${{ steps.sha.outputs.value }}" \
              managedEnvironmentId="${{ vars.ACA_ENV_ID }}" \
              managedIdentityResourceId="${{ vars.MI_RESOURCE_ID }}" \
              acrLoginServer="${{ vars.ACR_LOGIN_SERVER }}" \
              keyVaultUri="${{ vars.KEYVAULT_URI }}" \
              supabaseUrl="${{ vars.SUPABASE_URL }}" \
              withByok="${{ vars.WITH_BYOK || 'false' }}" \
              videoJobsDbConnection="$PG_CONN"

      # The dedicated cover-worker Container App (course-cover-images) — flipping vars.
      # COVER_GENERATION_ENABLED on both lets the API enqueue and deploys this. KEDA keeps it at zero
      # replicas until a job is enqueued. Scaler conn = the IPv4 pooler (same as migrations + video);
      # without a pooler host it deploys scaler-less (idles at 0).
      - name: Deploy cover worker (cover.bicep, prod)
        if: vars.COVER_GENERATION_ENABLED == 'true'
        env:
          PGPW: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          PG_CONN=""
          if [ -n "${{ vars.SUPABASE_DB_POOLER_HOST }}" ]; then
            ENCPW=$(python3 -c "import urllib.parse,os;print(urllib.parse.quote(os.environ['PGPW'],safe=''))")
            PG_CONN="postgresql://postgres.${{ vars.SUPABASE_PROJECT_REF }}:${ENCPW}@${{ vars.SUPABASE_DB_POOLER_HOST }}:5432/postgres?sslmode=require"
          else
            echo "::warning::SUPABASE_DB_POOLER_HOST unset — cover worker deploys without the KEDA scaler (idles at 0)."
          fi
          az deployment group create \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --name "lunaris-prod-cover-${{ github.run_number }}" \
            --template-file infra/cover.bicep \
            --parameters \
              env=prod \
              location="${{ vars.LOCATION }}" \
              image="${{ vars.ACR_LOGIN_SERVER }}/lunaris-cover-worker:${{ steps.sha.outputs.value }}" \
              managedEnvironmentId="${{ vars.ACA_ENV_ID }}" \
              managedIdentityResourceId="${{ vars.MI_RESOURCE_ID }}" \
              acrLoginServer="${{ vars.ACR_LOGIN_SERVER }}" \
              keyVaultUri="${{ vars.KEYVAULT_URI }}" \
              supabaseUrl="${{ vars.SUPABASE_URL }}" \
              withByok="${{ vars.WITH_BYOK || 'false' }}" \
              coverJobsDbConnection="$PG_CONN"

      # app.bicep's ingress block doesn't carry customDomains, so a deploy resets ingress and drops
      # the api.lunaris.pouyan.ai binding — restore it here (idempotent). DNS (CNAME + asuid TXT) and
      # the managed cert already exist on the env, so add+bind just re-attach them. The add is only
      # skipped when the hostname is already attached — any other failure fails the job instead of
      # being squelched, and the binding is verified afterwards so a green run means a bound domain.
      - name: Restore API custom domain
        if: vars.API_CUSTOM_DOMAIN != ''
        run: |
          set -euo pipefail
          DOMAIN="${{ vars.API_CUSTOM_DOMAIN }}"
          ENV_NAME=$(basename "${{ vars.ACA_ENV_ID }}")
          EXISTING=$(az containerapp hostname list -g "${{ vars.RESOURCE_GROUP }}" -n lunaris-prod-api \
            --query "[?name=='$DOMAIN'] | length(@)" -o tsv)
          if [ "$EXISTING" = "0" ]; then
            az containerapp hostname add -g "${{ vars.RESOURCE_GROUP }}" -n lunaris-prod-api \
              --hostname "$DOMAIN"
          fi
          az containerapp hostname bind -g "${{ vars.RESOURCE_GROUP }}" -n lunaris-prod-api \
            --hostname "$DOMAIN" \
            --environment "$ENV_NAME" \
            --certificate "${{ vars.API_CUSTOM_DOMAIN_CERT }}"
          BOUND=$(az containerapp hostname list -g "${{ vars.RESOURCE_GROUP }}" -n lunaris-prod-api \
            --query "[?name=='$DOMAIN' && bindingType=='SniEnabled'] | length(@)" -o tsv)
          if [ "$BOUND" != "1" ]; then
            echo "::error::Custom domain $DOMAIN is not SNI-bound after bind — prod would be unreachable at the custom host."
            exit 1
          fi

      # Alert rules scope to the Container App, so they deploy right after it (idempotent).
      - name: Deploy alert rules (alerts.bicep, prod)
        if: vars.ALERT_EMAIL != ''
        run: |
          az deployment group create \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --name "lunaris-prod-alerts-${{ github.run_number }}" \
            --template-file infra/alerts.bicep \
            --parameters env=prod alertEmail="${{ vars.ALERT_EMAIL }}"

      - name: Note alerts skip
        if: vars.ALERT_EMAIL == ''
        run: echo "::warning::ALERT_EMAIL not set for this environment — skipped Azure Monitor alert rules (no alerting on 5xx/restarts/memory)."

      # Prod's inference images are promoted manually (az acr import + containerapp update), so a
      # stale model server is the likeliest drift here. Warn — visibly, in the promote run itself —
      # when a running image predates the last change to infra/inference/**.
      - name: Check keyless inference images are not stale
        if: vars.DRAFT_TIER_ENABLED == 'true'
        run: |
          set -euo pipefail
          LAST_CHANGE=$(git log -1 --format=%H -- infra/inference/)
          check() {
            local app="$1" image tag
            image=$(az containerapp show -g "${{ vars.RESOURCE_GROUP }}" -n "$app" \
              --query 'properties.template.containers[0].image' -o tsv 2>/dev/null) || {
              echo "::warning::$app not found — the Draft tier is enabled but its model server isn't deployed."
              return 0
            }
            tag="${image##*:}"
            if git cat-file -e "$tag^{commit}" 2>/dev/null \
              && git merge-base --is-ancestor "$LAST_CHANGE" "$tag"; then
              echo "✅ $app image ($tag) includes the latest infra/inference change."
            else
              echo "::warning::$app runs image tag '$tag', which predates the last infra/inference change ($LAST_CHANGE) — rebuild via 'CD (inference images)', then az acr import + az containerapp update on prod."
            fi
          }
          check lunaris-prod-inference
          check lunaris-prod-embeddings

      # A green promote must mean a serving API: poll /api/healthz on the default FQDN (and the
      # custom domain when configured) until it answers 200, or fail the run.
      - name: Smoke test API (prod)
        run: |
          set -euo pipefail
          FQDN=$(az containerapp show -g "${{ vars.RESOURCE_GROUP }}" -n lunaris-prod-api \
            --query properties.configuration.ingress.fqdn -o tsv)
          HOSTS="https://$FQDN"
          [ -n "${{ vars.API_CUSTOM_DOMAIN }}" ] && HOSTS="$HOSTS https://${{ vars.API_CUSTOM_DOMAIN }}"
          for HOST in $HOSTS; do
            echo "Probing $HOST/api/healthz"
            ok=""
            for i in $(seq 1 30); do
              if curl -fsS --max-time 10 "$HOST/api/healthz" >/dev/null 2>&1; then
                echo "✅ $HOST healthy (attempt $i)"
                ok=1
                break
              fi
              sleep 10
            done
            if [ -z "$ok" ]; then
              echo "::error::$HOST/api/healthz did not return 200 within 5 minutes after deploy."
              exit 1
            fi
          done

      # Prod-operations control plane (prod-ops-admin, AD-3): the always-on app the on/off switch
      # calls, since stopping prod stops the API itself. Deployed LAST and non-fatally — it must never
      # block the API promote or the custom-domain restore above (an earlier failure here once dropped
      # the domain). Its identity's least-privilege start/stop role is applied ONCE, out-of-band, by an
      # Owner (CI lacks roleAssignments write) — see documentation/prod-ops-admin.md. Idempotent.
      - name: Deploy prod-ops control plane (prod-ops-control.bicep, prod)
        id: prodops_control
        continue-on-error: true
        run: |
          set -euo pipefail
          FQDN=$(az deployment group create \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --name "lunaris-prod-control-${{ github.run_number }}" \
            --template-file infra/prod-ops-control.bicep \
            --parameters \
              location="${{ vars.LOCATION }}" \
              acaEnvId="${{ vars.ACA_ENV_ID }}" \
              image="${{ vars.ACR_LOGIN_SERVER }}/lunaris-api:${{ steps.sha.outputs.value }}" \
              acrLoginServer="${{ vars.ACR_LOGIN_SERVER }}" \
              acrPullIdentityId="${{ vars.MI_RESOURCE_ID }}" \
              subscriptionId="${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
              adminEmails="${{ vars.LUNARIS_ADMIN_EMAILS }}" \
              supabaseUrl="${{ vars.SUPABASE_URL }}" \
              corsOrigins="${{ vars.CORS_ORIGINS }}" \
            --query properties.outputs.controlFqdn.value -o tsv)
          echo "url=https://$FQDN" >> "$GITHUB_OUTPUT"
          echo "Prod-ops control plane at https://$FQDN"

      - name: Deployment summary
        run: |
          FQDN=$(az containerapp show -g "${{ vars.RESOURCE_GROUP }}" -n lunaris-prod-api \
            --query properties.configuration.ingress.fqdn -o tsv)
          {
            echo "### Prod promote ✅"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Promoted SHA | \`${{ steps.sha.outputs.value }}\` |"
            echo "| URL | https://$FQDN |"
            echo "| Prod-ops control plane | ${{ steps.prodops_control.outputs.url }} |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice::Set the GitHub var VITE_PROD_CONTROL_URL to ${{ steps.prodops_control.outputs.url }} (then re-run the SPA build) so the prod-ops on/off switch targets the control plane."

  web:
    name: Build & deploy SPA (prod)
    runs-on: ubuntu-latest
    environment: prod
    # Built with the prod API host + the prod Supabase auth config, then uploaded to the prod SWA.
    # Without VITE_SUPABASE_* the SPA would ship auth-disabled while the prod API requires tokens.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          # The prod-ops on/off switch calls the always-on control plane (AD-3), not the API it
          # stops. Set this var to the control app's URL (printed by the promote job's control-plane
          # deploy step) after the first deploy; empty → the switch falls back to the API base.
          VITE_PROD_CONTROL_URL: ${{ vars.VITE_PROD_CONTROL_URL }}
      - name: Deploy to Static Web Apps (prod)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_DEPLOY_TOKEN }}
          action: upload
          app_location: apps/web/dist
          skip_app_build: true
          skip_api_build: true
